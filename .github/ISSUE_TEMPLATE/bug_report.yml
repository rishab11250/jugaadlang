name: Bug Report
description: Create a report to help us improve JugaadLang
title: "[Bug]: "
labels: ["bug"]
assignees:
  - ""
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: JugaadLang Version
      description: What version of JugaadLang are you using? (e.g., `jug --version`)
      placeholder: "1.0.3"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project does this bug affect?
      options:
        - Compiler / Core Language
        - CLI Tools
        - VS Code Extension
        - Docker
        - Website
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Write the following code '...'
        2. Run 'jug run ...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output or code snippet
      description: Please copy and paste any relevant log output or code snippets here.
      render: shell
