name: PR Create Automate Message

on:
  pull_request:
    types: [opened]

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on new PR
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Namaste! 🙏 Thanks for submitting this PR and sharing your awesome *jugaad* with us! We'll review your code shortly. Please make sure your hacks are solid, all CI checks are passing, and it follows our contribution guidelines. May your code compile on the first try! 🚀"
            })
